spring:
  application:
    name: vulnwatch-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vulnwatch}
    username: ${DB_USERNAME:${USER:postgres}}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration/postgres_reset
    baseline-on-migrate: false
    baseline-version: 1
    validate-on-migrate: true
    out-of-order: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  cache:
    caffeine:
      spec: maximumSize=100,expireAfterWrite=60s
    cache-names: dashboard
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  schema-migration:
    enabled: ${APP_SCHEMA_MIGRATION_ENABLED:false}
    report-only: ${APP_SCHEMA_MIGRATION_REPORT_ONLY:false}
  features:
    vex-policy-enabled: ${FEATURE_VEX_POLICY_ENABLED:true}
    vex-risk-modifiers-enabled: ${FEATURE_VEX_RISK_MODIFIERS_ENABLED:true}
    vex-rollout-controls-enabled: ${FEATURE_VEX_ROLLOUT_CONTROLS_ENABLED:true}
    vex-rollout-backfill-enabled: ${FEATURE_VEX_ROLLOUT_BACKFILL_ENABLED:true}
    software-model-enabled: ${FEATURE_SOFTWARE_MODEL_ENABLED:false}
  security:
    api-key: ${APP_API_KEY:}
    creator-key: ${APP_CREATOR_KEY:}
    allow-api-key-auth: ${APP_ALLOW_API_KEY_AUTH:true}
    credential-encryption-key: ${APP_CREDENTIAL_ENCRYPTION_KEY:}
    default-user-id: ${APP_DEFAULT_USER_ID:local-analyst}
    require-production-secrets: ${APP_REQUIRE_PRODUCTION_SECRETS:false}
    jwt:
      issuer-uri: ${APP_JWT_ISSUER_URI:}
      jwk-set-uri: ${APP_JWT_JWK_SET_URI:}
      hmac-secret: ${APP_JWT_HMAC_SECRET:}
      audience: ${APP_SECURITY_JWT_AUDIENCE:}
      token-ttl-minutes: ${APP_JWT_TOKEN_TTL_MINUTES:480}
      subject-claim: ${APP_SECURITY_JWT_SUBJECT_CLAIM:sub}
      active-tenant-id-claim: ${APP_JWT_ACTIVE_TENANT_ID_CLAIM:active_tenant_id}
      tenant-id-claim: ${APP_JWT_TENANT_ID_CLAIM:tenant_id}
      tenant-slug-claim: ${APP_JWT_TENANT_SLUG_CLAIM:tenant_slug}
      email-claim: ${APP_JWT_EMAIL_CLAIM:email}
      name-claim: ${APP_JWT_NAME_CLAIM:name}
      roles-claim: ${APP_JWT_ROLES_CLAIM:roles}
    bootstrap:
      platform-owners:
        enabled: ${APP_PLATFORM_OWNER_BOOTSTRAP_ENABLED:false}
        users: []
    local-auth:
      shared-localhost-login-enabled: ${APP_SHARED_LOCALHOST_LOGIN_ENABLED:false}
      shared-localhost-tenant-admin-email: ${APP_SHARED_LOCALHOST_TENANT_ADMIN_EMAIL:}
      shared-localhost-tenant-admin-password-hash: ${APP_SHARED_LOCALHOST_TENANT_ADMIN_PASSWORD_HASH:}
    headers:
      content-security-policy: ${APP_CONTENT_SECURITY_POLICY:default-src 'none'; frame-ancestors 'none'}
      permissions-policy: ${APP_PERMISSIONS_POLICY:camera=(), microphone=(), geolocation=(), payment=()}
  tenancy:
    allow-header-tenant-selection: ${APP_ALLOW_HEADER_TENANT_SELECTION:false}
    require-tenant-context: ${APP_REQUIRE_TENANT_CONTEXT:true}
    default-schema: ${APP_DEFAULT_TENANT_SCHEMA:tenant_default}
    enforce-schema-version: ${APP_ENFORCE_TENANT_SCHEMA_VERSION:false}
    minimum-compatible-schema-version: ${APP_MINIMUM_TENANT_SCHEMA_VERSION:42}
  test-personas:
    enabled: ${APP_TEST_PERSONAS_ENABLED:false}
    token-ttl-minutes: ${APP_TEST_PERSONA_TOKEN_TTL_MINUTES:60}
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
  email:
    resend:
      base-url: ${RESEND_BASE_URL:https://api.resend.com}
      api-key: ${RESEND_API_KEY:}
      from: ${RESEND_FROM_EMAIL:}
  sbom-fetch:
    max-payload-bytes: ${SBOM_FETCH_MAX_PAYLOAD_BYTES:5242880}
    allow-user-auth-header: ${SBOM_FETCH_ALLOW_USER_AUTH_HEADER:false}
    allowed-hosts: ${SBOM_FETCH_ALLOWED_HOSTS:}
  http:
    connect-timeout-ms: ${HTTP_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${HTTP_READ_TIMEOUT_MS:30000}
    outbound:
      # Shared defaults for outbound integrations; provider-specific settings override these in wave 1.
      min-request-interval-ms: ${HTTP_OUTBOUND_MIN_REQUEST_INTERVAL_MS:0}
      max-retries: ${HTTP_OUTBOUND_MAX_RETRIES:3}
      retry-base-backoff-ms: ${HTTP_OUTBOUND_RETRY_BASE_BACKOFF_MS:500}
      max-backoff-ms: ${HTTP_OUTBOUND_MAX_BACKOFF_MS:60000}
      honor-retry-after: ${HTTP_OUTBOUND_HONOR_RETRY_AFTER:true}
      retry-on-network-errors: ${HTTP_OUTBOUND_RETRY_ON_NETWORK_ERRORS:true}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    enabled: ${OPENAI_ENABLED:true}
  nvd:
    base-url: https://services.nvd.nist.gov/rest/json/cves/2.0
    api-key: ${NVD_API_KEY:}
    api-key-file: ${NVD_API_KEY_FILE:}
    default-lookback-hours: 24
    cve-delta-recompute-page-interval: ${NVD_CVE_DELTA_RECOMPUTE_PAGE_INTERVAL:${NVD_FINDINGS_RECOMPUTE_PAGE_INTERVAL:5}}
    results-per-page: ${NVD_RESULTS_PER_PAGE:2000}
    min-request-interval-ms: ${NVD_MIN_REQUEST_INTERVAL_MS:700}
    max-retries: ${NVD_MAX_RETRIES:5}
    retry-base-backoff-ms: ${NVD_RETRY_BASE_BACKOFF_MS:1000}
  csaf:
    max-documents-per-sync: ${CSAF_MAX_DOCUMENTS_PER_SYNC:300}
    document-fetch-max-attempts: ${CSAF_DOCUMENT_FETCH_MAX_ATTEMPTS:3}
    document-retry-backoff-ms: ${CSAF_DOCUMENT_RETRY_BACKOFF_MS:300}
    microsoft:
      provider-metadata-url: ${MICROSOFT_CSAF_PROVIDER_METADATA_URL:https://msrc.microsoft.com/csaf/provider-metadata.json}
      advisories-distribution-url: ${MICROSOFT_CSAF_ADVISORIES_DISTRIBUTION_URL:https://msrc.microsoft.com/csaf/advisories}
      vex-distribution-url: ${MICROSOFT_CSAF_VEX_DISTRIBUTION_URL:https://msrc.microsoft.com/csaf/vex}
    redhat:
      provider-metadata-url: ${REDHAT_CSAF_PROVIDER_METADATA_URL:https://security.access.redhat.com/data/csaf/v2/provider-metadata.json}
      advisories-distribution-url: ${REDHAT_CSAF_ADVISORIES_DISTRIBUTION_URL:https://security.access.redhat.com/data/csaf/v2/advisories}
      vex-distribution-url: ${REDHAT_CSAF_VEX_DISTRIBUTION_URL:https://security.access.redhat.com/data/csaf/v2/vex}
  ghsa:
    api-url: ${GHSA_API_URL:https://api.github.com/advisories}
    default-lookback-days: ${GHSA_DEFAULT_LOOKBACK_DAYS:7}
    per-page: ${GHSA_PER_PAGE:100}
    max-pages-per-sync: ${GHSA_MAX_PAGES_PER_SYNC:40}
  euvd:
    api-url: ${EUVD_API_URL:https://euvdservices.enisa.europa.eu/api/search}
    per-page: ${EUVD_PER_PAGE:100}
    max-pages-per-sync: ${EUVD_MAX_PAGES_PER_SYNC:200}
    min-request-interval-ms: ${EUVD_MIN_REQUEST_INTERVAL_MS:${HTTP_OUTBOUND_MIN_REQUEST_INTERVAL_MS:0}}
    max-retries: ${EUVD_MAX_RETRIES:${HTTP_OUTBOUND_MAX_RETRIES:3}}
    retry-base-backoff-ms: ${EUVD_RETRY_BASE_BACKOFF_MS:${HTTP_OUTBOUND_RETRY_BASE_BACKOFF_MS:500}}
  correlation:
    delta-queue-capacity: ${APP_CORRELATION_DELTA_QUEUE_CAPACITY:500}
    delta-queue-enqueue-timeout-ms: ${APP_CORRELATION_DELTA_QUEUE_ENQUEUE_TIMEOUT_MS:2000}
    delta-queue-poll-interval-ms: ${APP_CORRELATION_DELTA_QUEUE_POLL_INTERVAL_MS:2000}
    delta-queue-max-batches-per-tenant-per-poll: ${APP_CORRELATION_DELTA_QUEUE_MAX_BATCHES_PER_TENANT_PER_POLL:5}
  ingestion:
    admission:
      rate-limit-window-seconds: ${APP_INGESTION_ADMISSION_RATE_LIMIT_WINDOW_SECONDS:300}
      max-accepted-jobs-per-window: ${APP_INGESTION_ADMISSION_MAX_ACCEPTED_JOBS_PER_WINDOW:10}
      max-active-jobs-per-tenant: ${APP_INGESTION_ADMISSION_MAX_ACTIVE_JOBS_PER_TENANT:1}
    jobs:
      poll-interval-ms: ${APP_INGESTION_JOB_POLL_INTERVAL_MS:2000}
      poll-batch-size: ${APP_INGESTION_JOB_POLL_BATCH_SIZE:10}
      max-concurrent-per-tenant: ${APP_INGESTION_JOB_MAX_CONCURRENT_PER_TENANT:1}
      retry-delay-ms: ${APP_INGESTION_JOB_RETRY_DELAY_MS:5000}
  epss:
    # BLG-016: EPSS (Exploit Prediction Scoring System) integration
    base-url: ${EPSS_BASE_URL:https://api.first.org/data/v1/epss}
    enabled: ${EPSS_ENABLED:true}
    batch-size: ${EPSS_BATCH_SIZE:100}
    refresh-cron: ${EPSS_REFRESH_CRON:0 15 3 * * *}
  github:
    base-url: https://api.github.com
    api-token: ${GITHUB_API_TOKEN:}
    api-token-file: ${GITHUB_API_TOKEN_FILE:}
    allowlist-enabled: ${GITHUB_ALLOWLIST_ENABLED:true}
    allowed-repos: ${GITHUB_ALLOWED_REPOS:}
    allowed-packages: ${GITHUB_ALLOWED_PACKAGES:}
    max-retries: ${GITHUB_MAX_RETRIES:4}
    retry-base-backoff-ms: ${GITHUB_RETRY_BASE_BACKOFF_MS:1000}
    max-pages-per-collection: ${GITHUB_MAX_PAGES_PER_COLLECTION:250}
    min-rate-limit-remaining: ${GITHUB_MIN_RATE_LIMIT_REMAINING:25}
  slo:
    # BLG-014: Service level objective thresholds
    sbom-success-rate-min-pct: ${SLO_SBOM_SUCCESS_RATE_MIN_PCT:95.0}
    queue-max-pending: ${SLO_QUEUE_MAX_PENDING:100}
    queue-stale-threshold-minutes: ${SLO_QUEUE_STALE_THRESHOLD_MINUTES:10}
    queue-stale-max-count: ${SLO_QUEUE_STALE_MAX_COUNT:0}
    projection-stale-threshold-minutes: ${SLO_PROJECTION_STALE_THRESHOLD_MINUTES:15}
  assets:
    stale-days-to-inactive: ${ASSET_STALE_DAYS_TO_INACTIVE:30}
  archive:
    local-path: ${ARCHIVE_LOCAL_PATH:./data/vulnerability-archives}
  scheduling:
    enabled: ${APP_SCHEDULING_ENABLED:true}
  runtime:
    role: ${APP_RUNTIME_ROLE:all}
  performance:
    telemetry-refresh-ms: ${APP_PERFORMANCE_TELEMETRY_REFRESH_MS:30000}
  eol:
    # endoflife.date API integration
    base-url: ${EOL_BASE_URL:https://endoflife.date/api/v1}
    enabled: ${EOL_ENABLED:true}
    min-request-interval-ms: ${EOL_MIN_REQUEST_INTERVAL_MS:200}
    max-retries: ${EOL_MAX_RETRIES:5}
    retry-base-backoff-ms: ${EOL_RETRY_BASE_BACKOFF_MS:2000}
    catalog-refresh-cron: ${EOL_CATALOG_REFRESH_CRON:0 0 2 * * SUN}
    release-refresh-cron: ${EOL_RELEASE_REFRESH_CRON:0 0 3 * * SUN}
    resolve-mappings-cron: ${EOL_RESOLVE_MAPPINGS_CRON:0 30 3 * * SUN}
    denormalize-cron: ${EOL_DENORMALIZE_CRON:0 0 4 * * SUN}
  cmdb:
    servicenow:
      base-url: ${CMDB_SERVICENOW_BASE_URL:}
      username: ${CMDB_SERVICENOW_USERNAME:}
      password: ${CMDB_SERVICENOW_PASSWORD:}
    sccm:
      jdbc-url: ${SCCM_JDBC_URL:}
      username: ${SCCM_USERNAME:}
      password: ${SCCM_PASSWORD:}
      mock-mode: ${SCCM_MOCK_MODE:false}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
