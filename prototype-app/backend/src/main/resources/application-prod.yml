spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:30}
      minimum-idle: ${DB_MIN_IDLE:5}
  flyway:
    enabled: ${APP_PLATFORM_MIGRATION_ENABLED:false}
    validate-on-migrate: true
    out-of-order: false
  jpa:
    open-in-view: false
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  forward-headers-strategy: framework
  shutdown: graceful

app:
  security:
    require-production-secrets: true
    allow-api-key-auth: false
    validate-rls-runtime-role: true
  tenancy:
    allow-header-tenant-selection: false
    require-tenant-context: true
    enforce-schema-version: true
    minimum-compatible-schema-version: 44
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%level thread=%thread logger=%logger{36} traceId=%X{traceId:-} requestId=%X{requestId:-} tenantId=%X{tenantId:-} actorId=%X{actorId:-} message=%msg%n"
