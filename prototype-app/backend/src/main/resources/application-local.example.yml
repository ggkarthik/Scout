# Copy to application-local.yml (which is ignored) only when a local profile file is needed.
# Prefer environment variables from backend/.env.local.
app:
  security:
    api-key: ${APP_API_KEY:}
    credential-encryption-key: ${APP_CREDENTIAL_ENCRYPTION_KEY:}
    jwt:
      hmac-secret: ${APP_JWT_HMAC_SECRET:}
    local-auth:
      shared-localhost-login-enabled: ${APP_SHARED_LOCALHOST_LOGIN_ENABLED:false}
      shared-localhost-tenant-admin-email: ${APP_SHARED_LOCALHOST_TENANT_ADMIN_EMAIL:}
      shared-localhost-tenant-admin-password-hash: ${APP_SHARED_LOCALHOST_TENANT_ADMIN_PASSWORD_HASH:}
  email:
    resend:
      api-key: ${RESEND_API_KEY:}
      from: ${RESEND_FROM_EMAIL:}
