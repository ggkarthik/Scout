services:
  - type: web
    name: scout-backend
    runtime: docker
    plan: free
    region: singapore
    dockerContext: ./prototype-app/backend
    dockerfilePath: ./prototype-app/backend/Dockerfile
    autoDeploy: false
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "10000"
      - key: DB_HOST
        fromDatabase:
          name: scout-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: scout-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: scout-postgres
          property: database
      # Bootstrap with the owner only long enough to run migrations. The P0
      # validator deliberately prevents this role from serving production traffic.
      - key: DB_USERNAME
        fromDatabase:
          name: scout-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: scout-postgres
          property: password
      - key: APP_SCHEMA_MIGRATION_ENABLED
        value: "true"
      - key: APP_SCHEMA_MIGRATION_REPORT_ONLY
        value: "false"
      - key: APP_JWT_HMAC_SECRET
        generateValue: true
      - key: APP_CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: APP_JWT_ISSUER_URI
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: APP_TEST_PERSONAS_ENABLED
        value: "false"

databases:
  - name: scout-postgres
    databaseName: scout_production
    user: scout_migration
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    ipAllowList: []
