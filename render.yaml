services:
  - type: web
    name: scout-backend
    runtime: docker
    plan: free
    region: oregon
    dockerContext: ./prototype-app/backend
    dockerfilePath: ./prototype-app/backend/Dockerfile
    autoDeploy: false
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: preprod
      - key: SERVER_PORT
        value: "10000"
      # Supply only the restricted runtime role to the permanent web service.
      # The owner/migration connection is used by an approved one-off migration
      # operation and must never be stored in this service environment.
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_SCHEMA_MIGRATION_ENABLED
        value: "false"
      - key: APP_SCHEMA_MIGRATION_REPORT_ONLY
        value: "false"
      - key: APP_JWT_HMAC_SECRET
        generateValue: true
      - key: APP_ALLOW_HMAC_IN_PRODUCTION
        value: "true"
      - key: APP_CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: APP_JWT_ISSUER_URI
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://scoutgrid.io
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: APP_TEST_PERSONAS_ENABLED
        value: "false"
      - key: APP_ALLOW_API_KEY_AUTH
        value: "false"
      - key: APP_ALLOW_HEADER_TENANT_SELECTION
        value: "false"
      - key: APP_REQUIRE_TENANT_CONTEXT
        value: "true"
      # Direct membership for the internal playground only. The backend resolves
      # this identity through the platform user registry and never applies it to
      # customer tenants.
      - key: APP_PLAYGROUND_MEMBERSHIPS_ENABLED
        value: "true"
      - key: APP_PLAYGROUND_MEMBERSHIP_SUBJECTS
        value: scoutgrid.io@gmail.com
      - key: APP_PLAYGROUND_MEMBERSHIP_ROLE
        value: TENANT_ADMIN
