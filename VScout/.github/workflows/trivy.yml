name: Trivy Security Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write  # Required to upload SARIF to GitHub Security tab

jobs:
  filesystem:
    name: Filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'  # Don't fail the build; findings surface in Security tab

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  images:
    name: Docker image scan
    runs-on: ubuntu-latest
    needs: []  # Run in parallel with filesystem scan
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f prototype-app/backend/Dockerfile -t vulnwatch-backend:${{ github.sha }} prototype-app/backend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: vulnwatch-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload backend image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend-image

      - name: Build frontend image
        run: docker build -f prototype-app/frontend/Dockerfile -t vulnwatch-frontend:${{ github.sha }} prototype-app/frontend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: image
          image-ref: vulnwatch-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload frontend image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend-image
