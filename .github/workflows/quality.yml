name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  migration-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce tenant migration ownership
        run: python3 .github/scripts/check-tenant-ddl.py

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype-app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prototype-app/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:coverage

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype-app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn -q verify

  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: prototype-app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: >-
          mvn -q -Ppostgres-it
          -Dpostgres.test.username=postgres
          -Dpostgres.test.password=postgres
          verify

  docs-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Warn if source changed without docs
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.sha }}
          CODE_CHANGED=$(git diff --name-only "$BASE"..."$HEAD" | grep -cE '^prototype-app/(backend|frontend)/src/' || true)
          DOCS_CHANGED=$(git diff --name-only "$BASE"..."$HEAD" | grep -cE '^prototype-app/docs/' || true)
          if [ "$CODE_CHANGED" -gt 0 ] && [ "$DOCS_CHANGED" -eq 0 ]; then
            echo "::warning::Source code changed but no files in prototype-app/docs/ were updated. Check the Documentation section of the PR template."
          fi

  images:
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
      - backend-postgres
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f prototype-app/backend/Dockerfile -t vulnwatch-backend:${{ github.sha }} prototype-app/backend
      - name: Build frontend image
        run: docker build -f prototype-app/frontend/Dockerfile -t vulnwatch-frontend:${{ github.sha }} prototype-app/frontend
