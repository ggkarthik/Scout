name: Performance Governance

on:
  pull_request:
    paths:
      - ".github/workflows/performance-governance.yml"
      - "prototype-app/backend/**"
      - "prototype-app/scripts/**"
      - "prototype-app/docs/**"
  workflow_dispatch:
    inputs:
      seed_demo_data:
        description: Seed demo advisory data before certification
        required: false
        default: "false"
      baseline_iterations:
        description: Number of route-sampling iterations for the baseline phase
        required: false
        default: "3"
  schedule:
    - cron: "15 5 * * *"

jobs:
  certify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vulnwatch
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vulnwatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: prototype-app
    env:
      BASE_URL: http://127.0.0.1:8080
      API_KEY: change-me-in-prod
      CREATOR_KEY: local-creator
      APP_API_KEY: change-me-in-prod
      APP_CREATOR_KEY: local-creator
      APP_ALLOW_API_KEY_AUTH: "true"
      APP_REQUIRE_TENANT_CONTEXT: "false"
      APP_SCHEMA_MIGRATION_ENABLED: "true"
      DB_URL: jdbc:postgresql://127.0.0.1:5432/vulnwatch
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      APP_CREDENTIAL_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      START_BACKEND: "true"
      SPRING_PROFILES_ACTIVE: local
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      SEED_DEMO_DATA: ${{ github.event_name == 'workflow_dispatch' && (inputs.seed_demo_data || 'false') || 'false' }}
      BASELINE_ITERATIONS: ${{ inputs.baseline_iterations || '3' }}
      FAIL_ON_NONCOMPLIANT: "true"
      FAIL_ON_AUTH_SKIPS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run performance governance certification
        env:
          OUT_DIR: ${{ runner.temp }}/performance-governance
        run: sh ./scripts/run-performance-governance.sh

      - name: Upload performance governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-governance-${{ github.run_id }}
          path: ${{ runner.temp }}/performance-governance
          retention-days: 14
