name: CodeQL SAST

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 7 * * 1'  # Weekly on Monday at 07:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none  # CodeQL extracts JS/TS without building

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended  # Broader ruleset than default security-and-quality

      - name: Set up Java (for manual build)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Java backend
        if: matrix.language == 'java-kotlin'
        run: mvn -q package -DskipTests
        working-directory: prototype-app/backend

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-${{ matrix.language }}
